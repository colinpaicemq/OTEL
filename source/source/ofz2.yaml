receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        tls:
          cert_file: /server.pem
          key_file: /server.key.pem
          min_version: "1.3"  # Enforces TLS 1.3 as the minimum requirement
          max_version: "1.3"  # Locks maximum version to TLS 1.3
          cipher_suites: []
          reload_interval: "1h"
#processors:
#  attributes/colin:
#    actions:
#      - key: colinzz
#        value: colinzzvalue
#        action: insert

   

exporters:
  debug:
    verbosity: normal # basic: basic, normal, detailed

  otlp_http:
    endpoint: "http://jaeger2:4318"
    tls:
      insecure: true
  file/b:
      path: /b.file 
  file/in:
      path: /file.in     
  prometheus:
    endpoint: "0.0.0.0:8889"
    send_timestamps: true
    metric_expiration: 5m
          
connectors:
  count:
  span_metrics:
    histogram:
      explicit:
        buckets: [100us, 1ms, 2ms, 6ms, 10ms, 100ms, 250ms]
    dimensions:
      - name: http.method
        default: GET?
      - name: http.status_code
      - name: host.name
      - name: w3.tracestate
    exemplars:
      enabled: true
    dimensions_cache_size: 1000
    aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
    metrics_flush_interval: 15s
    metrics_expiration: 5m
    events:
      enabled: true
      dimensions:
        - name: exception.type
        - name: exception.message
    resource_metrics_key_attributes:
      - service.name
      - telemetry.sdk.language
      - telemetry.sdk.name
      - w3.tracestate
 
service:
  pipelines:
    traces:
      receivers: [otlp]
#      processors: [transform]
#      processors: [attributes/colin,transform]      
      exporters: [file/in,span_metrics,otlp_http]

    metrics:
      receivers: [span_metrics]
#      processors: [attributes/colin]
      exporters: [file/b,debug,prometheus]       
 
