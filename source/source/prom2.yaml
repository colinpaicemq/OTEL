global:

  # Set low scrape and evaluation intervals to speed up e2e test
  scrape_interval:     5s # Default is every 15sec
  evaluation_interval: 5s # Default is every 15sec
otlp:
  # Promote key OpenTelemetry resource attributes to Prometheus labels
  promote_resource_attributes:
    - service.name
    - service.namespace
    - deployment.environment

scrape_configs:
  - job_name: aggregated-trace-metrics
    static_configs:
    - targets: [ozf:8889]
